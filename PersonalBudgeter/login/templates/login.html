{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Budgeter</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="auth-logo-icon">💰</div>
            <span class="auth-logo-text">Budgeter</span>
        </div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to manage your finances</p>

        {% if form.errors %}
        <div class="alert alert-error">
            ⚠️ Invalid username or password. Please try again.
        </div>
        {% endif %}
        {% if error %}
        <div class="alert alert-error">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="post" id="login-form">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary w-full" style="justify-content:center; margin-top:0.5rem;">
                Sign In
            </button>
        </form>

        <div class="auth-footer-text">
            Don't have an account? <a href="{% url 'register' %}">Create one</a>
        </div>

    </div>
</div>

</body>
</html>
