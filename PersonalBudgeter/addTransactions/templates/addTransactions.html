{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions — Budgeter</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

{% include 'includes/navbar.html' %}

<div class="page-wrapper">

    <header class="page-header">
        <div class="page-header-title">
            <h1>Transactions</h1>
            <p>Record and review your income &amp; expenses</p>
        </div>
    </header>

    <main class="main-content">

        <div class="two-col" style="align-items:start;">

            <!-- Add Transaction Form -->
            <div class="card">
                <div class="card-header">
                    <div>
                        <h3>New Transaction</h3>
                        <p>Fill in the details below</p>
                    </div>
                </div>
                <div class="card-body">

                    <div id="form-alert" style="display:none;"></div>

                    <form id="transaction-form">
                        {% csrf_token %}

                        <div class="form-group">
                            <label for="expense_income">Transaction Type</label>
                            <select name="isIncome" id="expense_income">
                                <option value="False">Expense</option>
                                <option value="True">Income</option>
                            </select>
                        </div>
