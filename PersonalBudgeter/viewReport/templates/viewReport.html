{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports — Budgeter</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .report-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1.5rem;
            align-items: start;
        }
        .chart-card {
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }
        .chart-card .card-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .report-summary-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        #chart-placeholder {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem;
        }
        #chart-placeholder .icon { font-size: 3rem; opacity: 0.3; margin-bottom: 0.75rem; }
        @media (max-width: 900px) {
            .report-grid { grid-template-columns: 1fr; }
            .report-summary-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

{% include 'includes/navbar.html' %}

<div class="page-wrapper">

    <header class="page-header">
        <div class="page-header-title">
            <h1>Financial Reports</h1>
            <p>Visualize your spending patterns over time</p>
        </div>
    </header>

    <main class="main-content">

        <!-- Summary Row (populated after report generation) -->
        <div class="report-summary-row" id="report-summary" style="display:none;">
            <div class="stat-card">
                <div class="stat-icon green">💰</div>
                <div class="stat-info">
                    <div class="stat-label">Income</div>
                    <div class="stat-value income" id="rpt-income">$0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red">💸</div>
                <div class="stat-info">
                    <div class="stat-label">Expenses</div>
                    <div class="stat-value expense" id="rpt-expense">$0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon indigo">📊</div>
                <div class="stat-info">
                    <div class="stat-label">Transactions</div>
                    <div class="stat-value" id="rpt-count">0</div>
                </div>
            </div>
        </div>
