{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Edit Budget</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
</head>
<body>

<h2>Edit Budget</h2>

<form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category" required>
            <option value="food" {% if budget.category == "food" %}selected{% endif %}>Food</option>
            <option value="transport" {% if budget.category == "transport" %}selected{% endif %}>Transport</option>
            <option value="entertainment" {% if budget.category == "entertainment" %}selected{% endif %}>Entertainment</option>
            <option value="bills" {% if budget.category == "bills" %}selected{% endif %}>Bills</option>
        </select>
    </div>

    <div class="form-group">
        <label for="amount">Budget Amount</label>
        <input type="number" id="amount" name="amount" value="{{ budget.amount }}" required />
    </div>

    <div class="form-group">
        <label for="remaining_amount">Remaining Amount</label>
        <input type="number" id="remaining_amount" name="remaining_amount" value="{{ budget.remaining_amount }}" required />
    </div>

    <div class="form-group">
        <label for="start_date">Start Date</label>
        <input type="date" id="start_date" name="start_date" value="{{ budget.start_date }}" required />
    </div>

    <div class="form-group">
        <label for="end_date">End Date</label>
        <input type="date" id="end_date" name="end_date" value="{{ budget.end_date }}" required />
    </div>

    <div class="form-group">
        <label for="period">Period</label>
        <select id="period" name="period" required>
            <option value="weekly" {% if budget.period == "weekly" %}selected{% endif %}>Weekly</option>
            <option value="monthly" {% if budget.period == "monthly" %}selected{% endif %}>Monthly</option>
            <option value="yearly" {% if budget.period == "yearly" %}selected{% endif %}>Yearly</option>
        </select>
    </div>

    <button type="submit">Update Budget</button>
    <a href="{% url 'create_budget' %}"><button type="button">Cancel</button></a>
</form>

</body>
</html>
