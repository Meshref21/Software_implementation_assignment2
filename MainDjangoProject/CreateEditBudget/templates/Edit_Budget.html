{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Budget — Budgeter</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div id="navbar"></div>

<div class="page-wrapper">

    <header class="page-header">
        <div class="page-header-title">
            <h1>Edit Budget</h1>
            <p>Update the details for this budget</p>
        </div>
        <div class="page-header-actions">
            <a href="{% url 'create_budget' %}" class="btn btn-ghost btn-sm">← Back to Budgets</a>
        </div>
    </header>

    <main class="main-content">

        <div style="max-width:600px;">
            <div class="card">
                <div class="card-header">
                    <div>
                        <h3>{{ budget.category|capfirst }} Budget</h3>
                        <p>Editing budget #{{ budget.pk }}</p>
                    </div>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" name="category" required>
                                <option value="food"          {% if budget.category == "food" %}selected{% endif %}>🍔 Food</option>
                                <option value="transport"     {% if budget.category == "transport" %}selected{% endif %}>🚗 Transport</option>
                                <option value="entertainment" {% if budget.category == "entertainment" %}selected{% endif %}>🎬 Entertainment</option>
                                <option value="bills"         {% if budget.category == "bills" %}selected{% endif %}>🧾 Bills</option>
                                <option value="shopping"      {% if budget.category == "shopping" %}selected{% endif %}>🛍️ Shopping</option>
                                <option value="other"         {% if budget.category == "other" %}selected{% endif %}>📦 Other</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="amount">Budget Amount</label>
                                <input
                                    type="number"
                                    id="amount"
                                    name="amount"
                                    value="{{ budget.amount }}"
                                    min="0"
                                    step="0.01"
                                    required
                                >
                            </div>
                            <div class="form-group">
                                <label for="remaining_amount">Remaining Amount</label>
                                <input
                                    type="number"
                                    id="remaining_amount"
                                    name="remaining_amount"
                                    value="{{ budget.remaining_amount }}"
                                    min="0"
                                    step="0.01"
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="period">Period</label>
                            <select id="period" name="period" required>
                                <option value="weekly"  {% if budget.period == "weekly" %}selected{% endif %}>Weekly</option>
                                <option value="monthly" {% if budget.period == "monthly" %}selected{% endif %}>Monthly</option>
                                <option value="yearly"  {% if budget.period == "yearly" %}selected{% endif %}>Yearly</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="start_date">Start Date</label>
                                <input type="date" id="start_date" name="start_date" value="{{ budget.start_date }}" required>
                            </div>
                            <div class="form-group">
                                <label for="end_date">End Date</label>
                                <input type="date" id="end_date" name="end_date" value="{{ budget.end_date }}" required>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Update Budget</button>
                            <a href="{% url 'create_budget' %}" class="btn btn-ghost">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <div id="footer"></div>
</div>

<script src="{% static 'navbar_footer.js' %}"></script>
</body>
</html>
