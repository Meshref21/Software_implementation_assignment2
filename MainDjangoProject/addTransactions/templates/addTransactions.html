{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions — Budgeter</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div id="navbar"></div>

<div class="page-wrapper">

    <header class="page-header">
        <div class="page-header-title">
            <h1>Transactions</h1>
            <p>Record and review your income &amp; expenses</p>
        </div>
    </header>

    <main class="main-content">

        <div class="two-col" style="align-items:start;">

            <!-- Add Transaction Form -->
            <div class="card">
                <div class="card-header">
                    <div>
                        <h3>New Transaction</h3>
                        <p>Fill in the details below</p>
                    </div>
                </div>
                <div class="card-body">

                    <div id="form-alert" style="display:none;"></div>

                    <form id="transaction-form">
                        {% csrf_token %}

                        <div class="form-group">
                            <label for="expense_income">Transaction Type</label>
                            <select name="isIncome" id="expense_income">
                                <option value="False">💸 Expense</option>
                                <option value="True">💰 Income</option>
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="amount">Amount</label>
                                <input
                                    type="number"
                                    name="amount"
                                    id="amount"
                                    placeholder="0.00"
                                    min="0"
                                    step="0.01"
                                    required
                                >
                            </div>
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select name="category" id="category">
                                    <option value="food">🍔 Food</option>
                                    <option value="transport">🚗 Transport</option>
                                    <option value="shopping">🛍️ Shopping</option>
                                    <option value="salary">💼 Salary</option>
                                    <option value="other">📦 Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="payment_method">Payment Method</label>
                            <select name="paymentMethod" id="payment_method">
                                <option value="credit_card">💳 Credit Card</option>
                                <option value="master_card">💳 Master Card</option>
                                <option value="visa">💳 Visa</option>
                                <option value="mobile_wallet">📱 Mobile Wallet</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="desc">Description</label>
                            <input
                                type="text"
                                name="description"
                                id="desc"
                                placeholder="What was this for?"
                                maxlength="200"
                            >
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="submit-btn">
                                Save Transaction
                            </button>
                            <button type="reset" class="btn btn-ghost">Clear</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Transaction History -->
            <div class="card">
                <div class="card-header">
                    <div>
                        <h3>Transaction History</h3>
                        <p id="tx-count-label">Loading…</p>
                    </div>
                </div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Method</th>
                                <th>Amount</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="tx-tbody">
                            <tr><td colspan="5" class="text-muted" style="text-align:center;padding:2rem;">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </main>

    <div id="footer"></div>
</div>

<script src="{% static 'navbar_footer.js' %}"></script>
<script>
const API_URL = '/api/transaction/';

function getCsrf() {
    const el = document.querySelector('[name=csrfmiddlewaretoken]');
    return el ? el.value : '';
}

function showAlert(msg, type) {
    const el = document.getElementById('form-alert');
    el.className = `alert alert-${type}`;
    el.textContent = msg;
    el.style.display = 'flex';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
}

async function loadTransactions() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();
        const tbody = document.getElementById('tx-tbody');
        const label = document.getElementById('tx-count-label');
        label.textContent = `${data.length} record${data.length !== 1 ? 's' : ''}`;

        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-muted" style="text-align:center;padding:2rem;">No transactions yet.</td></tr>';
            return;
        }

        const categoryIcons = {
            food: '🍔', transport: '🚗', shopping: '🛍️', salary: '💼', other: '📦'
        };

        tbody.innerHTML = [...data].reverse().map(t => {
            const date = new Date(t.transactionDate).toLocaleDateString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric'
            });
            const icon = categoryIcons[t.category] || '📦';
            return `
                <tr>
                    <td>${t.description || '<span class="text-muted">—</span>'}</td>
                    <td><span class="badge badge-indigo">${icon} ${t.category}</span></td>
                    <td class="text-muted">${t.paymentMethod.replace('_', ' ')}</td>
                    <td class="${t.isIncome ? 'text-success' : 'text-danger'} fw-600">
                        ${t.isIncome ? '+' : '-'}$${parseFloat(t.amount).toFixed(2)}
                    </td>
                    <td class="text-muted">${date}</td>
                </tr>
            `;
        }).join('');
    } catch (e) {
        console.error(e);
    }
}

document.getElementById('transaction-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Saving…';
    btn.disabled = true;

    const form = new FormData(e.target);

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'X-CSRFToken': getCsrf() },
            body: form
        });

        if (res.ok) {
            showAlert('✅ Transaction saved successfully!', 'success');
            e.target.reset();
            await loadTransactions();
        } else {
            const err = await res.json();
            showAlert('❌ Error: ' + JSON.stringify(err), 'error');
        }
    } catch (err) {
        showAlert('❌ Network error. Please try again.', 'error');
    } finally {
        btn.textContent = 'Save Transaction';
        btn.disabled = false;
    }
});

loadTransactions();
</script>

</body>
</html>
