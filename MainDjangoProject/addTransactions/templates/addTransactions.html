<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Transaction</title>
    <script src="./postData.js" defer></script>
</head>
<body>

    <form action="" method="post">
        
        <label for="expense_income">Choose Expense or Income: </label>
        <select name="expense_income" id="expense_income">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
        </select>

        <br><br>

        <label for="category">Category: </label>
        <select name="category" id="category">
            <option value="food">Food</option>
        </select>

        <br><br>

        <label for="amount">Enter The Amount: </label>
        <input name="amount" id="amount" type="number">

        <br><br>

        <label for="desc">Description: </label>
        <input name="desc" id="desc" type="text">

        <br><br>

        <label for="payment_method">Enter Payment Method: </label>
        <select name="payment_method" id="payment_method">
            <option value="credit_card">Credit Card</option>
            <option value="master_card">Master Card</option>
            <option value="visa">Visa</option>
            <option value="mobile_wallet">Mobile Wallet</option>
        </select>

        <br><br>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
